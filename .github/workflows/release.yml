name: Release

on:
  workflow_call:
    inputs:
      version:
        description: Version tag for release assets.
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: Version tag for release assets.
        required: true
        type: string

permissions:
  contents: read

jobs:
  release:
    name: Build Web Release Asset
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Normalize version name
        id: version
        run: |
          RAW_VERSION="${{ inputs.version }}"
          SAFE_TAG="$(echo "${RAW_VERSION}" | tr '/' '-' | tr -cd '[:alnum:]._-')"
          if [ -z "${SAFE_TAG}" ]; then SAFE_TAG="release"; fi
          echo "safe_tag=${SAFE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Create release archive
        run: |
          cd dist
          zip -r ../alwaysfreeaac-${{ steps.version.outputs.safe_tag }}-web.zip .
          cd ..

      - name: Upload web release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: alwaysfreeaac-web-${{ steps.version.outputs.safe_tag }}
          path: alwaysfreeaac-${{ steps.version.outputs.safe_tag }}-web.zip
