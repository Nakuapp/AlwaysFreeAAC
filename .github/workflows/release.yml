name: Release

on:
  workflow_call:
    inputs:
      version:
        description: Version tag for release assets.
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: Version tag for release assets.
        required: true
        type: string

permissions:
  contents: read

jobs:
  release:
    name: Build Web Release Asset
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Normalize version name
        id: version
        run: |
          RAW_VERSION="${{ inputs.version }}"
          SAFE_TAG="$(echo "${RAW_VERSION}" | tr '/' '-' | tr -cd '[:alnum:]._-')"
          if [ -z "${SAFE_TAG}" ]; then SAFE_TAG="release"; fi
          echo "safe_tag=${SAFE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Create release archive
        run: |
          cd dist
          zip -r ../alwaysfreeaac-${{ steps.version.outputs.safe_tag }}-web.zip .
          cd ..

      - name: Upload web release artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: alwaysfreeaac-web-${{ steps.version.outputs.safe_tag }}
          path: alwaysfreeaac-${{ steps.version.outputs.safe_tag }}-web.zip
