name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create release archive
        run: |
          cd dist
          zip -r ../alwaysfreeaac-${{ github.ref_name }}.zip .
          cd ..

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: AlwaysFreeAAC ${{ github.ref_name }}
          generate_release_notes: true
          files: alwaysfreeaac-${{ github.ref_name }}.zip
