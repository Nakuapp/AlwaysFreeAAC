name: Tablet Screenshots

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  screenshots:
    name: Capture tablet screenshots
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Build
        run: npm run build

      - name: Install Playwright (Chromium only)
        run: npx playwright install --with-deps chromium

      - name: Start preview server
        run: npm run preview -- --port 4173 --strictPort --host 127.0.0.1 &

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:4173 > /dev/null && exit 0
            sleep 1
          done
          echo "Preview server did not start within 30 seconds" >&2
          exit 1

      - name: Capture screenshots
        run: node scripts/take-screenshots.mjs http://127.0.0.1:4173

      - name: Upload screenshots
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tablet-screenshots
          path: screenshots/
          if-no-files-found: error
