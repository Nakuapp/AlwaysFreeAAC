name: iOS Build

on:
  workflow_call:
    inputs:
      version:
        description: Label for generated build artifacts.
        required: true
        type: string
      artifact_type:
        description: iOS artifact type to build (`sideload_ipa` or `app_store_ipa`).
        required: false
        default: sideload_ipa
        type: string
    secrets:
      IOS_SIGNING_CERTIFICATE_P12_BASE64:
        required: false
      IOS_SIGNING_CERTIFICATE_PASSWORD:
        required: false
      IOS_SIGNING_PROVISIONING_PROFILE_BASE64:
        required: false
      IOS_SIGNING_TEAM_ID:
        required: false
      IOS_SIGNING_BUNDLE_ID:
        required: false
  workflow_dispatch:
    inputs:
      version:
        description: Label for generated build artifacts.
        required: true
        type: string
      artifact_type:
        description: iOS artifact type to build.
        required: false
        default: sideload_ipa
        type: choice
        options:
          - sideload_ipa
          - app_store_ipa

permissions:
  contents: read

jobs:
  ios:
    name: Build iOS Artifact
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build web app
        run: npm run build

      - name: Add iOS platform
        run: |
          if [ ! -d ios ]; then
            npx cap add ios
          fi

      - name: Generate native iOS app icon
        run: npx @capacitor/assets generate --ios

      - name: Sync web assets to iOS
        run: npx cap sync ios

      - name: Resolve iOS artifact metadata
        id: artifact
        run: |
          case "${{ inputs.artifact_type }}" in
            sideload_ipa)
              echo "artifact_label=ios" >> "${GITHUB_OUTPUT}"
              ;;
            app_store_ipa)
              echo "artifact_label=ios-app-store" >> "${GITHUB_OUTPUT}"
              ;;
            *)
              echo "Unsupported artifact_type: ${{ inputs.artifact_type }}. Expected one of: sideload_ipa, app_store_ipa." >&2
              exit 1
              ;;
          esac

      - name: Validate iOS signing secrets
        if: ${{ inputs.artifact_type == 'app_store_ipa' }}
        run: |
          missing=0
          for secret_name in \
            IOS_SIGNING_CERTIFICATE_P12_BASE64 \
            IOS_SIGNING_CERTIFICATE_PASSWORD \
            IOS_SIGNING_PROVISIONING_PROFILE_BASE64 \
            IOS_SIGNING_TEAM_ID \
            IOS_SIGNING_BUNDLE_ID; do
            if [ -z "${!secret_name}" ]; then
              echo "Missing required secret: ${secret_name}" >&2
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi
        env:
          IOS_SIGNING_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_SIGNING_CERTIFICATE_P12_BASE64 }}
          IOS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.IOS_SIGNING_CERTIFICATE_PASSWORD }}
          IOS_SIGNING_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_SIGNING_PROVISIONING_PROFILE_BASE64 }}
          IOS_SIGNING_TEAM_ID: ${{ secrets.IOS_SIGNING_TEAM_ID }}
          IOS_SIGNING_BUNDLE_ID: ${{ secrets.IOS_SIGNING_BUNDLE_ID }}

      - name: Install iOS signing assets
        if: ${{ inputs.artifact_type == 'app_store_ipa' }}
        id: signing
        run: |
          CERT_PATH="${RUNNER_TEMP}/ios-signing-cert.p12"
          PROFILE_PATH="${RUNNER_TEMP}/ios-signing.mobileprovision"
          PROFILE_PLIST="${RUNNER_TEMP}/ios-signing-profile.plist"
          KEYCHAIN_PATH="${RUNNER_TEMP}/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          printf '%s' "${{ secrets.IOS_SIGNING_CERTIFICATE_P12_BASE64 }}" | python3 -c 'import base64,sys;sys.stdout.buffer.write(base64.b64decode(sys.stdin.read()))' > "${CERT_PATH}"
          printf '%s' "${{ secrets.IOS_SIGNING_PROVISIONING_PROFILE_BASE64 }}" | python3 -c 'import base64,sys;sys.stdout.buffer.write(base64.b64decode(sys.stdin.read()))' > "${PROFILE_PATH}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" -P "${{ secrets.IOS_SIGNING_CERTIFICATE_PASSWORD }}" -A -t cert -f pkcs12 -k "${KEYCHAIN_PATH}"
          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}" login.keychain-db

          security cms -D -i "${PROFILE_PATH}" > "${PROFILE_PLIST}"
          PROFILE_UUID="$("/usr/libexec/PlistBuddy" -c "Print :UUID" "${PROFILE_PLIST}")"
          PROFILE_NAME="$("/usr/libexec/PlistBuddy" -c "Print :Name" "${PROFILE_PLIST}")"

          mkdir -p "${HOME}/Library/MobileDevice/Provisioning Profiles"
          cp "${PROFILE_PATH}" "${HOME}/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"

          echo "profile_uuid=${PROFILE_UUID}" >> "${GITHUB_OUTPUT}"
          echo "profile_name=${PROFILE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "keychain_path=${KEYCHAIN_PATH}" >> "${GITHUB_OUTPUT}"

      - name: Build iOS device app
        if: ${{ inputs.artifact_type != 'app_store_ipa' }}
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO

      - name: Build iOS App Store archive
        if: ${{ inputs.artifact_type == 'app_store_ipa' }}
        run: |
          xcodebuild archive \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath ios/build/AlwaysFreeAAC.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="${{ secrets.IOS_SIGNING_TEAM_ID }}" \
            PROVISIONING_PROFILE="${{ steps.signing.outputs.profile_uuid }}" \
            PROVISIONING_PROFILE_SPECIFIER="${{ steps.signing.outputs.profile_name }}" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            OTHER_CODE_SIGN_FLAGS="--keychain ${{ steps.signing.outputs.keychain_path }}"

      - name: Export signed App Store IPA
        if: ${{ inputs.artifact_type == 'app_store_ipa' }}
        run: |
          EXPORT_OPTIONS_PATH="${RUNNER_TEMP}/ExportOptions.plist"
          cat > "${EXPORT_OPTIONS_PATH}" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${{ secrets.IOS_SIGNING_TEAM_ID }}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ secrets.IOS_SIGNING_BUNDLE_ID }}</key>
              <string>${{ steps.signing.outputs.profile_name }}</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath ios/build/AlwaysFreeAAC.xcarchive \
            -exportPath ios/build/export \
            -exportOptionsPlist "${EXPORT_OPTIONS_PATH}"

      - name: Normalize build label
        id: label
        run: |
          RAW_VERSION="${{ inputs.version }}"
          SAFE_TAG="$(printf '%s' "${RAW_VERSION}" | tr '/' '-' | tr -cd '[:alnum:]._-')"
          if [ -z "${SAFE_TAG}" ]; then SAFE_TAG="ios"; fi
          echo "safe_tag=${SAFE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Resolve iOS artifact filename
        id: artifact_file
        run: |
          if [ "${{ inputs.artifact_type }}" = "app_store_ipa" ]; then
            echo "file_name=alwaysfreeaac-${{ steps.label.outputs.safe_tag }}-ios-app-store.ipa" >> "${GITHUB_OUTPUT}"
          else
            echo "file_name=alwaysfreeaac-${{ steps.label.outputs.safe_tag }}-ios.ipa" >> "${GITHUB_OUTPUT}"
          fi

      - name: Package iOS IPA
        if: ${{ inputs.artifact_type != 'app_store_ipa' }}
        run: |
          APP_PATH="$(find ios/build/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "${APP_PATH}" ]; then
            echo "No iOS .app bundle was produced." >&2
            exit 1
          fi
          mkdir -p Payload
          cp -R "${APP_PATH}" Payload/
          ditto -ck --sequesterRsrc --keepParent Payload "alwaysfreeaac-${{ steps.label.outputs.safe_tag }}-ios.ipa"
          rm -rf Payload

      - name: Package App Store IPA
        if: ${{ inputs.artifact_type == 'app_store_ipa' }}
        run: |
          IPA_PATH="$(find ios/build/export -maxdepth 1 -name '*.ipa' -print -quit)"
          if [ -z "${IPA_PATH}" ]; then
            echo "No App Store IPA was produced." >&2
            exit 1
          fi
          cp "${IPA_PATH}" "${{ steps.artifact_file.outputs.file_name }}"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: alwaysfreeaac-ios-${{ steps.label.outputs.safe_tag }}-${{ steps.artifact.outputs.artifact_label }}
          path: ${{ steps.artifact_file.outputs.file_name }}
