name: iOS Build

on:
  workflow_call:
    inputs:
      version:
        description: Version tag for release assets.
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: Version tag for release assets.
        required: true
        type: string

permissions:
  contents: read

jobs:
  ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build web app
        run: npm run build

      - name: Add iOS platform
        run: |
          if [ ! -d ios ]; then
            npx cap add ios
          fi

      - name: Generate native iOS app icon
        run: npx @capacitor/assets generate --ios

      - name: Sync web assets to iOS
        run: npx cap sync ios

      - name: Build iOS device app
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO

      - name: Normalize version name
        id: version
        run: |
          RAW_VERSION="${{ inputs.version }}"
          SAFE_TAG="$(echo "${RAW_VERSION}" | tr '/' '-' | tr -cd '[:alnum:]._-')"
          if [ -z "${SAFE_TAG}" ]; then SAFE_TAG="ios"; fi
          echo "safe_tag=${SAFE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Package iOS IPA
        run: |
          APP_PATH="$(find ios/build/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "${APP_PATH}" ]; then
            echo "No iOS .app bundle was produced." >&2
            exit 1
          fi
          mkdir -p Payload
          cp -R "${APP_PATH}" Payload/
          ditto -ck --sequesterRsrc --keepParent Payload "alwaysfreeaac-${{ steps.version.outputs.safe_tag }}-ios.ipa"
          rm -rf Payload

      - name: Upload iOS artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: alwaysfreeaac-ios-${{ steps.version.outputs.safe_tag }}
          path: alwaysfreeaac-${{ steps.version.outputs.safe_tag }}-ios.ipa
