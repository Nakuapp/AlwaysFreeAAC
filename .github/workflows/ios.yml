name: iOS Build

on:
  workflow_call:
    inputs:
      version:
        description: Label for generated build artifacts.
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: Label for generated build artifacts.
        required: true
        type: string

permissions:
  contents: read

jobs:
  ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build web app
        run: npm run build

      - name: Add iOS platform
        run: |
          if [ ! -d ios ]; then
            npx cap add ios
          fi

      - name: Generate native iOS app icon
        run: npx @capacitor/assets generate --ios

      - name: Sync web assets to iOS
        run: npx cap sync ios

      - name: Build iOS device app
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO

      - name: Normalize build label
        id: label
        run: |
          RAW_VERSION="${{ inputs.version }}"
          SAFE_TAG="$(printf '%s' "${RAW_VERSION}" | tr '/' '-' | tr -cd '[:alnum:]._-')"
          if [ -z "${SAFE_TAG}" ]; then SAFE_TAG="ios"; fi
          echo "safe_tag=${SAFE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Package iOS IPA
        run: |
          APP_PATH="$(find ios/build/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "${APP_PATH}" ]; then
            echo "No iOS .app bundle was produced." >&2
            exit 1
          fi
          mkdir -p Payload
          cp -R "${APP_PATH}" Payload/
          ditto -ck --sequesterRsrc --keepParent Payload "alwaysfreeaac-${{ steps.label.outputs.safe_tag }}-ios.ipa"
          rm -rf Payload

      - name: Upload iOS artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: alwaysfreeaac-ios-${{ steps.label.outputs.safe_tag }}
          path: alwaysfreeaac-${{ steps.label.outputs.safe_tag }}-ios.ipa
