name: iOS Build

on:
  workflow_call:
    inputs:
      version:
        description: Label for generated build artifacts.
        required: true
        type: string
      artifact_type:
        description: iOS artifact type to build (`sideload_ipa` or `app_store_archive`).
        required: false
        default: sideload_ipa
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: Label for generated build artifacts.
        required: true
        type: string
      artifact_type:
        description: iOS artifact type to build.
        required: false
        default: sideload_ipa
        type: choice
        options:
          - sideload_ipa
          - app_store_archive

permissions:
  contents: read

jobs:
  ios:
    name: Build iOS Artifact
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build web app
        run: npm run build

      - name: Add iOS platform
        run: |
          if [ ! -d ios ]; then
            npx cap add ios
          fi

      - name: Generate native iOS app icon
        run: npx @capacitor/assets generate --ios

      - name: Sync web assets to iOS
        run: npx cap sync ios

      - name: Resolve iOS artifact metadata
        id: artifact
        run: |
          case "${{ inputs.artifact_type }}" in
            app_store_archive)
              echo "artifact_label=ios-app-store-archive" >> "${GITHUB_OUTPUT}"
              ;;
            *)
              echo "artifact_label=ios" >> "${GITHUB_OUTPUT}"
              ;;
          esac

      - name: Build iOS device app
        if: ${{ inputs.artifact_type != 'app_store_archive' }}
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO

      - name: Build iOS archive for App Store submission
        if: ${{ inputs.artifact_type == 'app_store_archive' }}
        run: |
          xcodebuild archive \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath ios/build/AlwaysFreeAAC.xcarchive \
            CODE_SIGNING_ALLOWED=NO

      - name: Normalize build label
        id: label
        run: |
          RAW_VERSION="${{ inputs.version }}"
          SAFE_TAG="$(printf '%s' "${RAW_VERSION}" | tr '/' '-' | tr -cd '[:alnum:]._-')"
          if [ -z "${SAFE_TAG}" ]; then SAFE_TAG="ios"; fi
          echo "safe_tag=${SAFE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Resolve iOS artifact filename
        id: artifact_file
        run: |
          if [ "${{ inputs.artifact_type }}" = "app_store_archive" ]; then
            echo "file_name=alwaysfreeaac-${{ steps.label.outputs.safe_tag }}-ios-app-store.xcarchive.zip" >> "${GITHUB_OUTPUT}"
          else
            echo "file_name=alwaysfreeaac-${{ steps.label.outputs.safe_tag }}-ios.ipa" >> "${GITHUB_OUTPUT}"
          fi

      - name: Package iOS IPA
        if: ${{ inputs.artifact_type != 'app_store_archive' }}
        run: |
          APP_PATH="$(find ios/build/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "${APP_PATH}" ]; then
            echo "No iOS .app bundle was produced." >&2
            exit 1
          fi
          mkdir -p Payload
          cp -R "${APP_PATH}" Payload/
          ditto -ck --sequesterRsrc --keepParent Payload "alwaysfreeaac-${{ steps.label.outputs.safe_tag }}-ios.ipa"
          rm -rf Payload

      - name: Package iOS archive
        if: ${{ inputs.artifact_type == 'app_store_archive' }}
        run: |
          if [ ! -d ios/build/AlwaysFreeAAC.xcarchive ]; then
            echo "No iOS archive was produced." >&2
            exit 1
          fi
          ditto -ck --sequesterRsrc --keepParent ios/build/AlwaysFreeAAC.xcarchive "alwaysfreeaac-${{ steps.label.outputs.safe_tag }}-ios-app-store.xcarchive.zip"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: alwaysfreeaac-ios-${{ steps.label.outputs.safe_tag }}-${{ steps.artifact.outputs.artifact_label }}
          path: ${{ steps.artifact_file.outputs.file_name }}
