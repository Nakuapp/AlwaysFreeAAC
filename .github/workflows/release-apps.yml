name: Release Apps

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version number to release, with or without a leading v.
        required: true
        type: string

permissions:
  contents: read

jobs:
  prepare:
    name: Normalize Release Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.version.outputs.release_tag }}

    steps:
      - name: Normalize version
        id: version
        run: |
          RAW_VERSION="${{ inputs.version }}"
          TRIMMED_VERSION="$(printf '%s' "${RAW_VERSION}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          if [ -z "${TRIMMED_VERSION}" ]; then
            echo "Version input is required." >&2
            exit 1
          fi

          case "${TRIMMED_VERSION}" in
            v*) RELEASE_TAG="${TRIMMED_VERSION}" ;;
            *) RELEASE_TAG="v${TRIMMED_VERSION}" ;;
          esac

          echo "release_tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"

  web:
    name: Build Web Asset
    needs: prepare
    uses: ./.github/workflows/release.yml
    with:
      version: ${{ needs.prepare.outputs.release_tag }}

  android:
    name: Build Android Play Bundle
    needs: prepare
    uses: ./.github/workflows/android.yml
    with:
      version: ${{ needs.prepare.outputs.release_tag }}
      artifact_type: release_aab

  ios:
    name: Build iOS App Store Archive
    needs: prepare
    uses: ./.github/workflows/ios.yml
    with:
      version: ${{ needs.prepare.outputs.release_tag }}
      artifact_type: app_store_archive

  publish:
    name: Publish GitHub Release
    needs:
      - prepare
      - web
      - android
      - ios
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: AlwaysFreeAAC ${{ needs.prepare.outputs.release_tag }}
          generate_release_notes: true
          files: release-assets/*
