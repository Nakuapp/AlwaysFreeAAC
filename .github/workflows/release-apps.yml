name: Release Apps

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version number to release, with or without a leading v.
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    name: Normalize Release Version
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.version.outputs.release_tag }}

    steps:
      - name: Normalize version
        id: version
        run: |
          RAW_VERSION="${{ inputs.version }}"
          TRIMMED_VERSION="$(echo "${RAW_VERSION}" | xargs)"
          if [ -z "${TRIMMED_VERSION}" ]; then
            echo "Version input is required." >&2
            exit 1
          fi

          case "${TRIMMED_VERSION}" in
            v*) RELEASE_TAG="${TRIMMED_VERSION}" ;;
            *) RELEASE_TAG="v${TRIMMED_VERSION}" ;;
          esac

          echo "release_tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"

  web:
    name: Build Web Asset
    needs: prepare
    uses: ./.github/workflows/release.yml
    with:
      version: ${{ needs.prepare.outputs.release_tag }}

  android:
    name: Build Android Asset
    needs: prepare
    uses: ./.github/workflows/android.yml
    with:
      version: ${{ needs.prepare.outputs.release_tag }}

  ios:
    name: Build iOS Asset
    needs: prepare
    uses: ./.github/workflows/ios.yml
    with:
      version: ${{ needs.prepare.outputs.release_tag }}

  publish:
    name: Publish GitHub Release
    needs:
      - prepare
      - web
      - android
      - ios
    runs-on: ubuntu-latest

    steps:
      - name: Download release assets
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: AlwaysFreeAAC ${{ needs.prepare.outputs.release_tag }}
          generate_release_notes: true
          files: release-assets/*
