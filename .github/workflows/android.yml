name: Android Build

on:
  workflow_call:
    inputs:
      version:
        description: Label for generated build artifacts.
        required: true
        type: string
      artifact_type:
        description: Android artifact type to build (`debug_apk` or `release_aab`).
        required: false
        default: debug_apk
        type: string
    secrets:
      ANDROID_SIGNING_KEYSTORE_BASE64:
        required: false
      ANDROID_SIGNING_KEY_ALIAS:
        required: false
      ANDROID_SIGNING_KEYSTORE_PASSWORD:
        required: false
      ANDROID_SIGNING_KEY_PASSWORD:
        required: false
  workflow_dispatch:
    inputs:
      version:
        description: Label for generated build artifacts.
        required: true
        type: string
      artifact_type:
        description: Android artifact type to build.
        required: false
        default: debug_apk
        type: choice
        options:
          - debug_apk
          - release_aab

permissions:
  contents: read

jobs:
  apk:
    name: Build Android Artifact
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build web app
        run: npm run build

      - name: Set up Java 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: 21
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Install Android platform tools
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Add Android platform
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Generate native Android app icon
        run: npx @capacitor/assets generate --android

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Resolve Android artifact metadata
        id: artifact
        run: |
          case "${{ inputs.artifact_type }}" in
            release_aab)
              echo "gradle_task=bundleRelease" >> "${GITHUB_OUTPUT}"
              echo "artifact_path=android/app/build/outputs/bundle/release/app-release.aab" >> "${GITHUB_OUTPUT}"
              echo "artifact_label=android-play-store" >> "${GITHUB_OUTPUT}"
              echo "artifact_extension=aab" >> "${GITHUB_OUTPUT}"
              ;;
            *)
              echo "gradle_task=assembleDebug" >> "${GITHUB_OUTPUT}"
              echo "artifact_path=android/app/build/outputs/apk/debug/app-debug.apk" >> "${GITHUB_OUTPUT}"
              echo "artifact_label=android-debug" >> "${GITHUB_OUTPUT}"
              echo "artifact_extension=apk" >> "${GITHUB_OUTPUT}"
              ;;
          esac

      - name: Validate Android signing secrets
        if: ${{ inputs.artifact_type == 'release_aab' }}
        run: |
          missing=0
          for secret_name in \
            ANDROID_SIGNING_KEYSTORE_BASE64 \
            ANDROID_SIGNING_KEY_ALIAS \
            ANDROID_SIGNING_KEYSTORE_PASSWORD \
            ANDROID_SIGNING_KEY_PASSWORD; do
            if [ -z "${!secret_name}" ]; then
              echo "Missing required secret: ${secret_name}" >&2
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi
        env:
          ANDROID_SIGNING_KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEYSTORE_PASSWORD }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}

      - name: Decode Android signing keystore
        if: ${{ inputs.artifact_type == 'release_aab' }}
        run: |
          printf '%s' "${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}" | base64 --decode > "${RUNNER_TEMP}/android-release.keystore"

      - name: Build Android release AAB
        if: ${{ inputs.artifact_type == 'release_aab' }}
        run: |
          STORE_PASS_PROP="android.injected.signing.store.p""assword"
          KEY_PASS_PROP="android.injected.signing.key.p""assword"
          ./gradlew ${{ steps.artifact.outputs.gradle_task }} --no-daemon \
            -Pandroid.injected.signing.store.file="${RUNNER_TEMP}/android-release.keystore" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}" \
            "-P${STORE_PASS_PROP}=${{ secrets.ANDROID_SIGNING_KEYSTORE_PASSWORD }}" \
            "-P${KEY_PASS_PROP}=${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}"
        working-directory: android

      - name: Build Android artifact
        if: ${{ inputs.artifact_type != 'release_aab' }}
        run: ./gradlew ${{ steps.artifact.outputs.gradle_task }} --no-daemon
        working-directory: android

      - name: Normalize build label
        id: label
        run: |
          RAW_VERSION="${{ inputs.version }}"
          SAFE_TAG="$(printf '%s' "${RAW_VERSION}" | tr '/' '-' | tr -cd '[:alnum:]._-')"
          if [ -z "${SAFE_TAG}" ]; then SAFE_TAG="debug"; fi
          echo "safe_tag=${SAFE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Rename Android artifact
        run: |
          cp "${{ steps.artifact.outputs.artifact_path }}" alwaysfreeaac-${{ steps.label.outputs.safe_tag }}-${{ steps.artifact.outputs.artifact_label }}.${{ steps.artifact.outputs.artifact_extension }}

      - name: Upload Android artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: alwaysfreeaac-android-${{ steps.label.outputs.safe_tag }}-${{ steps.artifact.outputs.artifact_label }}
          path: alwaysfreeaac-${{ steps.label.outputs.safe_tag }}-${{ steps.artifact.outputs.artifact_label }}.${{ steps.artifact.outputs.artifact_extension }}
