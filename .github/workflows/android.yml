name: Android APK

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build web app
        run: npm run build

      - name: Set up Java 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install Android platform tools
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: android

      - name: Normalize tag name
        id: tag
        run: |
          RAW_TAG="${{ github.event.release.tag_name || github.ref_name || 'debug' }}"
          SAFE_TAG="$(echo "${RAW_TAG}" | tr '/' '-' | tr -cd '[:alnum:]._-')"
          if [ -z "${SAFE_TAG}" ]; then SAFE_TAG="debug"; fi
          echo "safe_tag=${SAFE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk alwaysfreeaac-${{ steps.tag.outputs.safe_tag }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: alwaysfreeaac-apk-${{ steps.tag.outputs.safe_tag }}
          path: alwaysfreeaac-${{ steps.tag.outputs.safe_tag }}.apk

      - name: Attach APK to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: alwaysfreeaac-${{ steps.tag.outputs.safe_tag }}.apk
