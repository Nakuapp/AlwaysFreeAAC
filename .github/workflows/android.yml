name: Android APK

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build web app
        run: npm run build

      - name: Set up Java 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: 21
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Install Android platform tools
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: android

      - name: Normalize tag name
        id: tag
        run: |
          RAW_TAG="${{ github.event.release.tag_name || github.ref_name || 'debug' }}"
          SAFE_TAG="$(echo "${RAW_TAG}" | tr '/' '-' | tr -cd '[:alnum:]._-')"
          if [ -z "${SAFE_TAG}" ]; then SAFE_TAG="debug"; fi
          echo "safe_tag=${SAFE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk alwaysfreeaac-${{ steps.tag.outputs.safe_tag }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: alwaysfreeaac-apk-${{ steps.tag.outputs.safe_tag }}
          path: alwaysfreeaac-${{ steps.tag.outputs.safe_tag }}.apk

      - name: Attach APK to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: alwaysfreeaac-${{ steps.tag.outputs.safe_tag }}.apk
